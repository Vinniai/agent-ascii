<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-ascii — top third</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(165deg, #0f1419 0%, #1a2332 45%, #0d1117 100%);
      color: #e6edf3;
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo, monospace;
    }
    .stage {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr 2fr;
      padding: 0 2rem;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: clamp(1rem, 4vh, 2.5rem);
    }
    .title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1.15;
      color: #58a6ff;
      text-shadow: 0 0 40px rgba(88, 166, 255, 0.35);
    }
    .subtitle {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: #8b949e;
      text-align: center;
      max-width: 36ch;
    }
    .rest {
      /* lower two-thirds intentionally empty for contrast with basic page */
      opacity: 0.15;
      border-top: 1px dashed #30363d;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="top">
      <div>
        <div class="title">agent-ascii</div>
        <p class="subtitle">Example page — title in the upper third (grid 1fr / 2fr).</p>
      </div>
    </div>
    <div class="rest" aria-hidden="true"></div>
  </div>
</body>
</html>
