<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-ascii — basic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(165deg, #0f1419 0%, #1a2332 45%, #0d1117 100%);
      color: #e6edf3;
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo, monospace;
    }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1.15;
      color: #58a6ff;
      text-shadow: 0 0 40px rgba(88, 166, 255, 0.35);
    }
    .subtitle {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: #8b949e;
      text-align: center;
      max-width: 36ch;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div>
      <div class="title">agent-ascii</div>
      <p class="subtitle">Example page — centered layout for layout / braille smoke output.</p>
    </div>
  </div>
</body>
</html>
