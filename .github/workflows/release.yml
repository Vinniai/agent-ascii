name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          test "v${PKG_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release metadata
        run: npm run release:check

      - name: Publish GitHub release assets
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-platform-packages:
    needs: release-assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_dir: packages/npm/darwin-arm64
            binary_name: agent-ascii
            goos: darwin
            goarch: arm64
          - package_dir: packages/npm/darwin-x64
            binary_name: agent-ascii
            goos: darwin
            goarch: amd64
          - package_dir: packages/npm/linux-arm64
            binary_name: agent-ascii
            goos: linux
            goarch: arm64
          - package_dir: packages/npm/linux-x64
            binary_name: agent-ascii
            goos: linux
            goarch: amd64
          - package_dir: packages/npm/win32-x64
            binary_name: agent-ascii.exe
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release metadata
        run: npm run release:check

      - name: Build platform binary
        run: |
          mkdir -p "${{ matrix.package_dir }}/bin"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
            -ldflags "-s -w -X github.com/Vinniai/agent-ascii/internal/version.Version=${GITHUB_REF_NAME#v}" \
            -o "${{ matrix.package_dir }}/bin/${{ matrix.binary_name }}" \
            .

      - name: Publish platform package
        run: npm publish "${{ matrix.package_dir }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-root-package:
    needs: release-assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release metadata
        run: npm run release:check

      - name: Publish root package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
